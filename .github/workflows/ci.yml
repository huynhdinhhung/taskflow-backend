name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://taskflow:password@localhost:5432/taskflow_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret
      NODE_ENV: test
      PORT: 4000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check JavaScript syntax
        run: |
          node -c src/app.js
          node -c src/server.js
          node -c src/config/db.js
          node -c src/config/redis.js
          node -c src/modules/auth/auth.service.js
          node -c src/modules/auth/auth.controller.js
          node -c src/modules/auth/auth.routes.js

      - name: Build Docker image test
        run: docker build -t taskflow-backend:test .

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/taskflow
            docker compose -f docker-compose.prod.yml pull taskflow-backend
            docker compose -f docker-compose.prod.yml up -d taskflow-backend
            docker compose -f docker-compose.prod.yml exec -T taskflow-backend npx prisma migrate deploy
            docker image prune -f
            curl -f http://localhost:4001/health
